name: Portfolio CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:

    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Setup Node (for tools)
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 18

    # 3. Install HTML validator
    - name: Install HTMLHint
      run: npm install -g htmlhint

    # 4. Lint HTML
    - name: Lint HTML
      run: htmlhint "*.html"

    # 5. Run Lighthouse (performance test)
    - name: Lighthouse Check
      uses: treosh/lighthouse-ci-action@v10
      with:
        urls: |
          https://sivaranjaniparthiban.github.io/portfolio/
        uploadArtifacts: true
        temporaryPublicStorage: true

    # 6. Deploy automatically (GitHub Pages already handles this)
